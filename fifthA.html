<!DOCTYPE html>
<html>
<head>
    <title>CSS color References</title>
    <style>

        .color1 {
            color:darkorchid;
        }
        .color2 {
            color: #fff000;
        }
        .color3 {
            color: rgb(0, 225, 255);
        }
        .color4 {
            color: rgba(255, 42, 0, 0.884);
        }
        .color5 {
            color: hsl(298, 100%, 53%);
        }
        .color6 {
            color: hsla(138, 100%, 24%, 0.6);
        }
    </style>
</head>
<body>
    <h2>Different Ways to Reference Color in CSS</h2>

    <h4 class="color1">This text uses Color Name</h4>
    <h4 class="color2">This text uses Hex Color </h4>
    <h4 class="color3">This text uses RGB Color </h4>
    <h4 class="color4">This text uses RGBA Color </h4>
    <h4 class="color5">This text uses HSL Color</h4>
    <h4 class="color6">This text uses HSLA Color</h4>

</body>
</html>
