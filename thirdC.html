<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Styles Demo Clean</title>

    <!-- Internal CSS -->
    <style>
        h1 {
            text-align: center;
            color: darkorange;
        }

        .boxed {
        
            padding: 10px;
            margin: 10px 0;
            background-color: #f0f0f0;
        }

        #notice {
            font-weight: bold;
            color: crimson;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline Style -->
    <p style="font-size: 20px; color: teal;">
        This paragraph is styled using inline CSS.
    </p>

    <h1>Internal CSS Example</h1>

    <div class="boxed">
        This div is styled using an internal class selector.
    </div>

    <p id="notice">
        This paragraph uses an ID selector from internal CSS.
    </p>

    <p class="external-style">
        This paragraph is styled using external CSS.
    </p>

</body>
</html>
