<!DOCTYPE html>
<html>
<head>
  <title>CSS Box Model</title>
  <style>
    .box {
      width: 300px;                 /* Content */
      height: 150px;                /* Content */
      background-color:bisque;  /* Content area */

      padding: 20px;                /* Padding */
      border:5px solid brown;       /* Border */
      margin: 30px;                 /* Margin */

      font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>CSS Box Model Demonstration</h2>

  <div class="box">
    This is the CONTENT area
  </div>

</body>
</html>
