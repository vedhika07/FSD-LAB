<!DOCTYPE html>
<html>
<head>
  <title>Internal and External JavaScript</title>

  <!-- Internal JavaScript -->
  <script>
    document.write("This is Internal JavaScript output.<br>");
  </script>
</head>

<body>

  <h2>Embedding JavaScript Example</h2>

  <!-- External JavaScript will run below -->
<button onclick="showMessage()">Click Me</button>
  <!-- Linking External JavaScript -->
  <script src="script.js"></script>

</body>
</html>
