<!DOCTYPE html>
<html>
<body>

<script>

let amt = parseInt(prompt("Enter deposited amount"));

let n100 = Math.floor(amt/100);
amt %= 100;

let n50 = Math.floor(amt/50);
amt %= 50;

let n20 = Math.floor(amt/20);
amt %= 20;

let n10 = Math.floor(amt/10);
amt %= 10;

let n5 = Math.floor(amt/5);
amt %= 5;

let n2 = Math.floor(amt/2);
amt %= 2;

let n1 = amt;

document.write("100's: " + n100 + "<br>");
document.write("50's: " + n50 + "<br>");
document.write("20's: " + n20 + "<br>");
document.write("10's: " + n10 + "<br>");
document.write("5's: " + n5 + "<br>");
document.write("2's: " + n2 + "<br>");
document.write("1's: " + n1);

</script>

</body>
</html>
