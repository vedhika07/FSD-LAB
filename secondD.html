<!DOCTYPE html>
<html>
<head>
    <title>HTML Frames Example</title>
</head>

<frameset cols="33%,34%,33%">
    <frame src="image1.html" noresize>
    <frame src="paragraph.html" noresize>
    <frame src="link.html" noresize>

    <noframes>
        <body>

        </body>
    </noframes>
</frameset>

</html>
