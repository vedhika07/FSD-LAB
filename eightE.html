<!DOCTYPE html>
<html>
<body>

<script>

let num = parseInt(prompt("Enter a number"));
let temp = num;
let sum = 0;

while(num > 0){
    let r = num % 10;
    sum += r*r*r;
    num = Math.floor(num/10);
}

if(sum == temp)
    document.write("Armstrong Number");
else
    document.write("Not an Armstrong Number");

</script>

</body>
</html>
