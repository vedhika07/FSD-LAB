<!DOCTYPE html>
<html>
<head>
    <title>Hyperlinks Example</title>
</head>
<body>

    <h2>HTML Hyperlinks Example</h2>

    <!-- Simple hyperlink -->
    <p>
        <a href="https://www.google.com" target="_self">
            Click here to open Google
        </a>
    </p>

    <!-- Hyperlink opening in a new tab -->
    <p>
        <a href="https://www.wikipedia.org" target="_blank">
            click here to open wikipedia
        </a>
    </p>
    <p>
        <a href="https://www.youtube.com/" target="_parent">
            click here to open youtube
        </a>
    </p>

  
</body>
</html>
