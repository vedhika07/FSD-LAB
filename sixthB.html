<!DOCTYPE html>
<html>
<head>
  <title>Different Ways of Displaying Output</title>
</head>

<body>
<p id="result"></p> 
  <h2>Output Display Methods</h2>
  <script>
    /* 1. Using alert() */
    alert("This is output using alert()");

    /* 2. Using document.write() */
    document.write("This is output using document.write()<br>");

    /* 3. Using innerHTML */
    document.getElementById("result").innerHTML =
      "This is output using innerHTML";

    /* 4. Using console.log() */
    console.log("This is output using console.log()");
  </script>

</body>
</html>
