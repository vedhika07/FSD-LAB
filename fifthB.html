<!DOCTYPE html>
<html>
<head>
    <title>Tilted Flower Background</title>
    <style>
        body {
            margin: 0;
            min-height: 200vh; /* for scrolling */
            font-family: Arial, sans-serif;
            text-align: center;
            position: relative;
        }

        /* Background image layer */
        body::before {
            content: "flower";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;

            background-image: url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");
            background-size: cover;
            background-repeat: no-repeat;

            transform: translate(-50%, -50%) skewX(5deg); /* TILT ONLY IMAGE */
            opacity: 2;
            z-index: -1; /* behind text */
        }

        h1 {
            margin-top: 50px;
        }

        p {
            width: 60%;
            margin: auto;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Flower image </h1>
    <p>
        Scroll the page.  
        The flower image stays fixed in the middle and is tilted,  
        but the text is normal.
    </p>

    <p style="margin-top:800px;">
        Extra content to enable scrolling.  
        Image does not move while scrolling.
    </p>

</body>
</html>
