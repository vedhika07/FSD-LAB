<!DOCTYPE html>
<html>
<head>
<title>Number Operations</title>
<script>

function factorial() {
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("result").innerHTML = "Factorial: " + fact;
}

function fibonacci() {
    let n = parseInt(document.getElementById("num").value);
    let a = 0, b = 1, series = "";

    for (let i = 0; i < n; i++) {
        series += a + " ";             
        let temp = a + b;
        a = b;
        b = temp;
    }

    document.getElementById("result").innerHTML = "Fibonacci: " + series;
}

function prime() {
    let n = parseInt(document.getElementById("num").value);
    let primes = "";

    for (let i = 2; i <= n; i++) {
        let isPrime = true;

        for (let j = 2; j < i; j++) {
            if (i % j == 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            primes += i + " ";
        }
    }

    document.getElementById("result").innerHTML = "Prime numbers: " + primes;
}

function palindrome() {
    let num = document.getElementById("num").value;
    let rev = num.split("").reverse().join("");

    if (num == rev) {
        document.getElementById("result").innerHTML = "It is a Palindrome";
    } else {
        document.getElementById("result").innerHTML = "Not a Palindrome";
    }
}

</script>
</head>

<body>

<h2>Number Operations</h2>

Enter Number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

</body>
</html>
